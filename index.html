<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Add to Home Screen</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #111111);
    --hint: var(--tg-theme-hint-color, #707579);
    --btn: var(--tg-theme-button-color, #2ea6ff);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1e1e1e; --text: #f0f0f0; --hint: #9a9a9a; --btn: #2ea6ff; --btn-text: #ffffff; }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body[dir="rtl"] { text-align: right; }
  .wrap {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
  }
  .icon { font-size: 56px; margin-bottom: 12px; }
  h1 { font-size: 20px; margin: 0 0 8px; }
  p.hint { color: var(--hint); font-size: 14px; margin: 0 0 28px; line-height: 1.4; max-width: 320px; }
  ol.steps {
    color: var(--text); font-size: 14px; line-height: 1.6;
    margin: 18px 0 0; padding-left: 20px; max-width: 320px;
    text-align: left; width: 100%;
  }
  body[dir="rtl"] ol.steps { padding-left: 0; padding-right: 20px; text-align: right; }
  ol.steps li { margin-bottom: 4px; }
  button {
    appearance: none; border: none; border-radius: 12px;
    background: var(--btn); color: var(--btn-text);
    font-size: 16px; font-weight: 600;
    padding: 14px 28px; width: 100%; max-width: 320px;
    cursor: pointer;
  }
  button:active { opacity: 0.85; }
  .state-success .icon { color: #34c759; }
</style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="icon" id="icon">📲</div>
    <h1 id="title">Add to Home Screen</h1>
    <p class="hint" id="hint">Add the bot's icon to your home screen for one-tap access.</p>
    <button id="action-btn" type="button">Add</button>
    <ol class="steps" id="steps"></ol>
  </div>

<script>
(function () {
  var STRINGS = {
    ru: {
      title: "Добавить бота на рабочий стол",
      hint: "Значок бота появится прямо на рабочем столе телефона — не нужно будет искать его в Telegram. После нажатия кнопки ниже откроется системное окно, где нужно будет сделать ещё несколько шагов:",
      button: "📲 Добавить на рабочий стол",
      steps: {
        ios: [
          "Нажмите значок «Поделиться» <b>⬆️</b> внизу экрана",
          "Выберите пункт «На экран «Домой»» <b>➕</b>",
          "Нажмите «Добавить» в правом верхнем углу"
        ],
        android: [
          "В открывшемся окне нажмите кнопку «Добавить»"
        ],
        other: [
          "Следуйте подсказкам, которые покажет Telegram"
        ]
      },
      added_title: "Готово!",
      added_hint: "Значок бота уже есть на рабочем столе — можно закрыть это окно и найти его среди других приложений.",
      unsupported_title: "Пока недоступно",
      unsupported_hint: "Добавление на рабочий стол работает только в мобильном приложении Telegram (iOS/Android) последней версии. Откройте бота с телефона и обновите Telegram, если нужно.",
      missed_title: "Не добавлено",
      missed_hint: "Вы закрыли окно подтверждения, не нажав «Добавить». Нажмите кнопку ниже, чтобы попробовать снова.",
      retry: "Попробовать снова"
    },
    en: {
      title: "Add the bot to your Home Screen",
      hint: "The bot's icon will appear right on your phone's home screen — no need to search for it inside Telegram. Tapping the button below opens a system window where you'll need a couple more steps:",
      button: "📲 Add to Home Screen",
      steps: {
        ios: [
          "Tap the Share icon <b>⬆️</b> at the bottom of the screen",
          "Select <b>➕</b> \"Add to Home Screen\"",
          "Tap \"Add\" in the top-right corner"
        ],
        android: [
          "In the window that opens, tap \"Add\""
        ],
        other: [
          "Follow the prompts Telegram shows next"
        ]
      },
      added_title: "Done!",
      added_hint: "The bot's icon is already on your home screen — you can close this and find it among your other apps.",
      unsupported_title: "Not available yet",
      unsupported_hint: "Adding to the home screen only works in the latest Telegram mobile app (iOS/Android). Open the bot from your phone and update Telegram if needed.",
      missed_title: "Not added",
      missed_hint: "You closed the confirmation popup without tapping \"Add\". Tap the button below to try again.",
      retry: "Try again"
    },
    he: {
      title: "הוספת הבוט למסך הבית",
      hint: "סמל הבוט יופיע ישירות במסך הבית של הטלפון — לא יהיה צורך לחפש אותו בתוך טלגרם. לחיצה על הכפתור למטה תפתח חלון מערכת, שבו יהיה צורך בעוד כמה שלבים:",
      button: "📲 הוספה למסך הבית",
      steps: {
        ios: [
          "הקש על סמל השיתוף <b>⬆️</b> בתחתית המסך",
          "בחר <b>➕</b> «הוספה למסך הבית»",
          "הקש «הוספה» בפינה הימנית העליונה"
        ],
        android: [
          "בחלון שנפתח, הקש «הוספה»"
        ],
        other: [
          "פעל לפי ההנחיות שטלגרם יציג"
        ]
      },
      added_title: "בוצע!",
      added_hint: "סמל הבוט כבר נמצא במסך הבית שלך — אפשר לסגור את החלון הזה ולמצוא אותו בין שאר האפליקציות.",
      unsupported_title: "עדיין לא זמין",
      unsupported_hint: "הוספה למסך הבית עובדת רק באפליקציית טלגרם הניידת (iOS/Android) בגרסה העדכנית. פתח את הבוט מהטלפון ועדכן את טלגרם במידת הצורך.",
      missed_title: "לא נוסף",
      missed_hint: "סגרת את חלון האישור בלי ללחוץ «הוספה». לחץ על הכפתור למטה כדי לנסות שוב.",
      retry: "נסה שוב"
    }
  };

  var params = new URLSearchParams(location.search);
  var lang = params.get('lang');
  var t = STRINGS[lang] || STRINGS.en;
  if (lang === 'he') document.body.setAttribute('dir', 'rtl');

  var tg = window.Telegram && window.Telegram.WebApp;
  var platformKey = 'other';
  if (tg && tg.platform === 'ios') platformKey = 'ios';
  else if (tg && tg.platform === 'android') platformKey = 'android';

  var els = {
    icon: document.getElementById('icon'),
    title: document.getElementById('title'),
    hint: document.getElementById('hint'),
    btn: document.getElementById('action-btn'),
    steps: document.getElementById('steps'),
    app: document.getElementById('app')
  };

  els.title.textContent = t.title;
  els.hint.textContent = t.hint;
  els.btn.textContent = t.button;
  els.steps.innerHTML = (t.steps[platformKey] || t.steps.other)
    .map(function (s) { return '<li>' + s + '</li>'; })
    .join('');

  function render(state) {
    if (state === 'added') {
      els.app.className = 'wrap state-success';
      els.icon.textContent = '✅';
      els.title.textContent = t.added_title;
      els.hint.textContent = t.added_hint;
      els.btn.style.display = 'none';
      els.steps.style.display = 'none';
    } else if (state === 'unsupported') {
      els.icon.textContent = 'ℹ️';
      els.title.textContent = t.unsupported_title;
      els.hint.textContent = t.unsupported_hint;
      els.btn.style.display = 'none';
      els.steps.style.display = 'none';
    } else if (state === 'missed') {
      els.icon.textContent = '📲';
      els.title.textContent = t.missed_title;
      els.hint.textContent = t.missed_hint;
      els.btn.textContent = t.retry;
      els.btn.style.display = 'block';
      els.steps.style.display = 'block';
    } else {
      els.btn.style.display = 'block';
      els.steps.style.display = 'block';
    }
  }

  function notifyBot(status) {
    if (tg && tg.sendData) {
      try { tg.sendData(JSON.stringify({ home_screen: status })); } catch (e) {}
    }
  }

  if (!tg || !tg.isVersionAtLeast || !tg.isVersionAtLeast('8.0')) {
    render('unsupported');
  } else {
    tg.ready();
    tg.expand();

    tg.onEvent('homeScreenAdded', function () {
      render('added');
      notifyBot('added');
    });
    tg.onEvent('homeScreenChecked', function () {});

    tg.checkHomeScreenStatus(function (status) {
      // status: 'unsupported' | 'unknown' | 'added' | 'missed'
      render(status === 'unknown' ? 'default' : status);
    });

    els.btn.addEventListener('click', function () {
      tg.addToHomeScreen();
    });
  }
})();
</script>
</body>
</html>
